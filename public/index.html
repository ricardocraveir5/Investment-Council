<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Council">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Investment Council</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<!-- Toast notifications -->
<div id="toast-container" class="toast-container"></div>

<!-- Alert modal -->
<div id="alert-modal" class="alert-modal" style="display:none">
  <div class="alert-modal-box">
    <div class="alert-modal-title">Set Alerts for <span id="alert-modal-ticker"></span></div>
    <div class="alert-modal-field">
      <label>Stop-Loss (%)</label>
      <input type="number" id="alert-stop-loss" placeholder="e.g. 10" step="any" min="0">
      <span class="alert-modal-hint">Alert if position drops by this %</span>
    </div>
    <div class="alert-modal-field">
      <label>Take-Profit (%)</label>
      <input type="number" id="alert-take-profit" placeholder="e.g. 25" step="any" min="0">
      <span class="alert-modal-hint">Alert if position gains this %</span>
    </div>
    <div class="alert-modal-actions">
      <button class="form-cancel" id="alert-modal-cancel">Cancel</button>
      <button class="form-save" id="alert-modal-save">Save Alerts</button>
    </div>
  </div>
</div>

<!-- Sidebar overlay -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3>Conversations</h3>
    <button class="new-chat-btn" id="new-chat-btn">+ New Chat</button>
  </div>
  <div class="conv-list" id="conv-list"></div>
</div>

<!-- Council View -->
<div class="view" id="council-view">
  <div class="hdr">
    <div class="hdr-top">
      <button class="hamburger" id="hamburger">&#9776;</button>
      <div class="logo">&#127963;</div>
      <div style="flex:1"><div class="ttl">Investment Council</div><div class="sub">10 AI minds + financial data</div></div>
      <button class="cbtn" id="cb" style="display:none">Clear</button>
    </div>
    <div class="chips-row">
      <button class="all-btn" id="all-toggle">&#9889; All</button>
      <div id="advisor-chips" style="display:contents"></div>
    </div>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="ina">
    <div class="ir">
      <div class="mbg" id="mbg"></div>
      <input type="text" id="inp" placeholder="Ask the council..." autocomplete="off">
      <button class="snd" id="snd" disabled>&#8593;</button>
    </div>
    <div class="disc">Powered by Claude &middot; Not financial advice</div>
  </div>
</div>

<!-- Portfolio View -->
<div class="view" id="portfolio-view" style="display:none">
  <div class="hdr">
    <div class="hdr-top">
      <button class="hamburger" onclick="document.getElementById('hamburger').click()">&#9776;</button>
      <div class="logo" style="background:linear-gradient(135deg,#8B7A2A,#C4A44A)">&#128188;</div>
      <div style="flex:1"><div class="ttl">Portfolio</div><div class="sub">Track & analyze your positions</div></div>
    </div>
  </div>
  <div class="portfolio-scroll" id="portfolio-content"></div>
  <div class="add-position-bar">
    <button class="add-pos-btn" id="add-position-btn">+ Add Position</button>
  </div>
  <div class="add-form" id="add-position-form">
    <div class="add-form-row">
      <input type="text" id="pos-ticker" placeholder="Ticker (e.g. AAPL)" autocapitalize="characters">
      <input type="number" id="pos-shares" placeholder="Shares" step="any">
      <input type="number" id="pos-cost" placeholder="Price $" step="any">
    </div>
    <div class="add-form-row">
      <input type="date" id="pos-date" placeholder="Purchase date">
    </div>
    <div class="add-form-actions">
      <button class="form-cancel" id="add-form-cancel">Cancel</button>
      <button class="form-save" id="add-form-save">Add</button>
    </div>
  </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <button class="nav-btn nav-active" id="nav-council"><span class="nav-icon">&#127963;</span>Council</button>
  <button class="nav-btn" id="nav-portfolio"><span class="nav-icon">&#128188;</span>Portfolio</button>
</div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
